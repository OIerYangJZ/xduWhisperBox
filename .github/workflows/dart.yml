name: Dart CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: XDYou (traintime_pda) for path dependency
        run: bash scripts/setup_xdyou.sh

      - run: flutter pub get
      - run: flutter analyze

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: XDYou (traintime_pda) for path dependency
        run: bash scripts/setup_xdyou.sh

      - run: flutter pub get
      - run: flutter test

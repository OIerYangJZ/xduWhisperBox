# deploy/production/nginx-cache.conf
# Nginx 缓存配置片段（可 include 到主 Nginx 配置中）
#
# 使用方式：
#   在 server {} 块中加入：include /path/to/nginx-cache.conf;
# 或直接复制以下内容到 nginx-xdu-whisperbox.conf 的对应位置。

# ============================================================
# 静态资源长期缓存（由 build hash 控制，文件变更后 URL 变掉）
# ============================================================
location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";

    # 跨域资源共享（允许 CDN / 外部引用）
    add_header Access-Control-Allow-Origin "*";

    # 禁止日志记录（静态资源高频请求不需要记录）
    access_log off;
}

# ============================================================
# HTML 不缓存（确保用户始终加载最新版本）
# ============================================================
location ~* \.html$ {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
}

# ============================================================
# 媒体文件中等缓存（图片等较大资源）
# ============================================================
location ~* \.(mp4|webm|ogg|mp3|wav|pdf|zip|tar|gz)$ {
    expires 7d;
    add_header Cache-Control "public";
}

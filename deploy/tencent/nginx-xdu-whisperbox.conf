upstream backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

# 统一认证对齐要求：
# 1. server_name 必须改成 IDS 已登记的正式域名
# 2. 生产环境必须启用 HTTPS，并将 80 重定向到 443
# 3. /etc/xdu-whisperbox.env 中 BACKEND_XIDIAN_PUBLIC_ORIGIN 必须与这里的 HTTPS Origin 完全一致

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # HTTP -> HTTPS 重定向（生产环境建议启用）
    # return 301 https://$host$request_uri;

    # 以下为 HTTPS 配置模板（取消注释并配合证书使用）
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;
    # server_name your-domain.com;
    #
    # ssl_certificate     /etc/nginx/ssl/cert.pem;
    # ssl_certificate_key /etc/nginx/ssl/key.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    # ssl_prefer_server_ciphers off;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout  1d;
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    client_max_body_size 20m;

    # 日志配置
    access_log /var/log/nginx/xdu-whisperbox.access.log;
    error_log  /var/log/nginx/xdu-whisperbox.error.log;

    gzip on;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml
        application/wasm;

    # 静态资源：Flutter Web 构建产物
    location / {
        root /opt/xdu-whisperbox/current/build/web;
        index index.html;
        try_files $uri $uri/ /index.html;

        # HTML 文件不缓存（由 build hash 控制的 JS/CSS 通过长期缓存实现更新）
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # 缓存策略（由 build hash 控制，长期缓存已命名的资源）
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin "*";
            access_log off;
        }

        # 媒体文件中等缓存
        location ~* \.(mp4|webm|ogg|mp3|wav|pdf|zip|tar|gz)$ {
            expires 7d;
            add_header Cache-Control "public";
        }
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # 超时配置
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer 配置
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # 健康检查接口允许的请求体大小
        proxy_request_buffering off;
    }

    # Nginx 自身健康检查（给云负载均衡器使用）
    location /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
